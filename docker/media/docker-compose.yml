services:
  plex:
    image: lscr.io/linuxserver/plex@sha256:1dd281365d61fb76fd4474ba67e36ec94d2e8dbc67a8032ba10731c01701c97e
    container_name: plex

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - VERSION=docker

    volumes:
      - /mnt/ssd2/appdata/plex:/config
      - /mnt/ssd2/media:/media

    networks:
      - proxy_net

    restart: unless-stopped

networks:
  proxy_net:
    external: true