services:
  plex:
    image: lscr.io/linuxserver/plex@sha256:1dd281365d61fb76fd4474ba67e36ec94d2e8dbc67a8032ba10731c01701c97e
    container_name: plex

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - VERSION=docker

    ports:
      - 32400:32400

    volumes:
      - /mnt/ssd2/appdata/plex:/config
      - /mnt/ssd2/media:/media

    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128

    group_add:
      - render
      - video

    dns:
      - 1.1.1.1
      - 8.8.8.8

    networks:
      - proxy_net

    restart: unless-stopped

networks:
  proxy_net:
    external: true