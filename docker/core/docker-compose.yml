services:
  nginxpm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginxpm
    restart: unless-stopped

    ports:
      - "80:80"
      - "81:81"
      - "443:443"

    volumes:
      - /mnt/ssd2/appdata/nginxpm:/data
      - /mnt/ssd2/appdata/nginxpm/letsencrypt:/etc/letsencrypt

    networks:
      - proxy_net

networks:
  proxy_net:
    external: true